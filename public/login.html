<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Blog Website</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <section class="card" style="max-width: 920px; margin: 70px auto; padding: 48px;">
            <h2 style="color: white; margin-top: 0;">Log In</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button type="button" onclick="login()">Login</button>
                <button type="button" onclick="window.location.href='signup.html'">Go To Sign Up</button>
                <button type="button" onclick="window.location.href='index.html'">Back To Home</button>
            </div>
        </section>
    </div>
    <script src="auth-pages.js"></script>
</body>
</html>
